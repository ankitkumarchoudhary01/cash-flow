<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Flow Page</title>
    <link rel="stylesheet" href="styles.css">

</head>

<body>
    <header>
        <h1>Cash Flow</h1>
    </header>
    <div id="warningBanner" class="warning-banner">
        ⚠ Warning: Remaining balance is below 10% of your salary!
    </div>
    <div class="currency-container">
    <label for="currency">Currency</label>

    <select id="currency">
        <option value="INR">INR (₹)</option>
        <option value="USD">USD ($)</option>
        <option value="EUR">EUR (€)</option>
        <option value="GBP">GBP (£)</option>
        <option value="JPY">JPY (¥)</option>
    </select>
</div>
    <main>
        <div class="output">
            <section id="inputForm">
                <form id="form">

                    <div class="form-group">
                        <label for="salary">Salary (in Rs.)</label>
                        <input type="number" id="salary" min="1" placeholder="Enter your salary" required>
                    </div>

                    <div class="form-group">
                        <label for="expenseName">Expense Name</label>
                        <input type="text" id="expenseName" placeholder="Food, Shopping, etc." required>
                    </div>

                    <div class="form-group">
                        <label for="expenseAmount">Expense Amount (in Rs.)</label>
                        <input type="number" id="expenseAmount" min="1" placeholder="1000" required>
                    </div>

                    <p id="errorMessage" aria-live="polite"></p>

                    <button type="submit">
                        Add Expense
                    </button>

                </form>
            </section>

            <section id="dashboard">
                <div class="dashboard-header">
                    <h2>Expense Summary</h2>
                    <button><a href="#chart-card">View Analytics</a>
                </div>

                <div class="card">
                    <h3>Salary</h3>
                    <p id="salaryDisplay">₹0</p>
                </div>

                <div class="expenseList">
                    <h3>Expense List</h3>
                    <ul id="expenseList">
                        <li class="empty-state">No expenses added yet.</li>
                    </ul>
                </div>

                <div class="card">
                    <h3>Total Expenses</h3>
                    <p id="expenseDisplay">₹0</p>
                </div>

                <div class="card">
                    <h3>Remaining Balance</h3>
                    <p id="balanceDisplay">₹0</p>
                </div>

            </section>
        </div>

        <section id="chart-card" class="chart-card">
            <h3 for="expenseChart">Expense Chart</h3>
            <p id="chartMessage">Enter your expenses to view the chart.</p>
            <canvas id="expenseChart"></canvas>
        </section>
        <div class="button-container">
            <div class="report-container">
                <button id="downloadReport">
                    Download Report
                </button>
            </div>

            <div class="reset-container">
                <button id="resetButton" class="reset-button">Reset</button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
